<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Paper Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Question Paper Generator</h1>
        
        <div class="input-section">
            <div class="file-upload">
                <input type="file" id="excelFile" accept=".xlsx, .xls" />
                <label for="excelFile">Upload Excel File</label>
            </div>

            <div class="paper-type">
                <h3>Select Paper Type:</h3>
                <select id="paperType">
                    <option value="mid1">First Mid (Units 1-2)</option>
                    <option value="mid2">Second Mid (Units 3-5)</option>
                </select>
            </div>

            <button id="generateButton">Generate Question Paper</button>
        </div>

        <div class="output-section">
            <div id="questionPaper"></div>
            <button id="downloadButton" style="display: none;">Download Question Paper</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
